# 名称： Chunlion_Rule-Set_DNS-Leak_Lite
# 项目地址：https://github.com/Chunlion/Clash_Rule-Set
# 说明： ①本文件适用于Mihomo核心的工具使用； ②使用前需补充完整 “订阅链接” 与 “机场名”;  ③订阅链接和机场名请勿随意泄露，以免造成不必要的麻烦； 
# 原作者频道：https://t.me/Seven1gogogo，项目地址：https://github.com/Seven1echo/Yaml，此分流文件大幅度精简规则仅保留必要分流，并且做了防止DNS泄露的配置，欢迎参考修改。


# ※※※※※※※※※※※※※※※ 锚点区域 ※※※※※※※※※※※※※※※
# ① 订阅锚点
Anchor_PR: &Anchor_PR {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 300}, filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|时间|说明|重置)).*$"}
# ② 出站锚点
Anchor_OB: &Anchor_OB {type: select, proxies: [一键代理, 全局最优, 稳定备用, 香港节点, 澳门节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 欧洲节点, 家宽节点, 其他节点]}
Anchor_SP: &Anchor_SP {type: select, proxies: [一键代理, 全局最优, 稳定备用, 香港节点, 澳门节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 欧洲节点, 家宽节点, 其他节点, DIRECT]}
Anchor_AI: &Anchor_AI {type: select, proxies: [家宽节点, 美国节点, 一键代理, 香港节点, 澳门节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 欧洲节点, 其他节点]}
# ③ 策略锚点
Anchor_HS: &Anchor_HS {type: select, include-all: true}
Anchor_UT_Global: &Anchor_UT_Global {type: url-test, url: 'https://cp.cloudflare.com/generate_204', interval: 300, tolerance: 50, timeout: 2000, hidden: true, include-all: true}
Anchor_FB_Global: &Anchor_FB_Global {type: fallback, url: 'https://cp.cloudflare.com/generate_204', interval: 300, timeout: 2000, hidden: true}
# ④ 规则锚点
Anchor_DN: &Anchor_DN {type: http, interval: 86400, behavior: domain, format: mrs}
Anchor_IP: &Anchor_IP {type: http, interval: 86400, behavior: ipcidr, format: mrs}
Anchor_CL: &Anchor_CL {type: http, interval: 86400, behavior: classical, format: text}
# ⑤ 区域锚点
# 地区词决定归属；IEPL / IPLC / BGP / Game / 倍率等线路标签不参与地区判断。
# 没有明确地区词的节点进入“其他”分组，避免把线路标签误当成地区特征。
Anchor_HK: &Anchor_HK '^(?i)(?=.*(香港|🇭🇰|\bHK\b|Hong(?:\s?Kong)?|HKG|HKT|HK|HKBN)).*$'
Anchor_MO: &Anchor_MO '^(?i)(?=.*(澳门|澳門|🇲🇴|\bMO\b|\bMFM\b|Macao|Macau)).*$'
Anchor_TW: &Anchor_TW '^(?i)(?=.*(台湾|台灣|🇹🇼|\bTW\b|\bTPE\b|\bTSA\b|\bKHH\b|Taiwan|Taipei|Kaohsiung|taiwan|TPE|TSA|KHH)).*$'
Anchor_JP: &Anchor_JP '^(?i)(?=.*(日本|🇯🇵|\bJP\b|Japan|Tokyo|Osaka|TYO|OSA|NRT|HND|KIX|CTS|FUK)).*$'
Anchor_KR: &Anchor_KR '^(?i)(?=.*(韩国|韓國|🇰🇷|首尔|首爾|\bKR\b|\bKOR\b|Korea|Seoul|SEL|ICN|South)).*$'
Anchor_SG: &Anchor_SG '^(?i)(?=.*(新加坡|🇸🇬|\bSG\b|Singapore|SGP|SIN|XSP)).*$'
Anchor_US: &Anchor_US '^(?i)(?=.*(美国|美國|🇺🇸|\bUS\b|\bUSA\b|\bNA\b|United\s?States|America|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
Anchor_HOME: &Anchor_HOME '^(?i)(?=.*(家宽|🏠|家庭宽带|宽带|住宅|民宅|\bResidential\b|\bHome\b|\bISP\b|Broadband)).*$'
Anchor_EU: &Anchor_EU '^(?i)(?=.*(奥地利|奥地利共和国|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|London|United\s?Kingdom|England|Germany|France|Netherlands|Amsterdam|Frankfurt|Paris|LON|UK|GB|GBR|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|LHR|LGW)).*$'
Anchor_OT: &Anchor_OT '^(?!.*(DIRECT|直接连接|香港|澳门|澳門|台湾|台灣|日本|韩国|韓國|新加坡|美国|美國|奥地利|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|London|Germany|France|Netherlands|Tokyo|Osaka|Seoul|Singapore|Taipei|Kaohsiung|Macau|Macao|🇭🇰|🇲🇴|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|HK|HKBN|MO|MFM|TW|SG|SGP|JP|TYO|OSA|KR|SEL|ICN|US|USA|NA|GB|GBR|LON|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|HKT|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW)).*$'



# ※※※※※※※※※※※※※※※ 节点订阅 ※※※※※※※※※※※※※※※
# 将 “订阅链接” 与 “机场名” 替换为所用机场信息； 订阅条数不够可新增，注意开头缩进，不同条数前方 “机场名” 不能重复； 末尾的 “机场名” 作用为每个节点添加机场名称前缀，可自定义。
proxy-providers:
  机场1: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场1 '}}
  #机场2: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场2 '}}
  #机场3: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场3 '}}

# ※※※※※※※※※※※※※※※ 核心配置 ※※※※※※※※※ ※※※※ ※
# 基础配置
mixed-port: 7893                                                        # 监听端口  HTTP + SOCKS5 混合代理端口
mode: rule                                                              # 工作模式  rule（规则模式）/ global（全局模式）/ direct（直连模式）
find-process-mode: strict                                               # 进程匹配  匹配进程名进行规则分流
allow-lan: false                                                        # 局域连接  桌面端默认关闭，避免暴露代理入口
bind-address: 127.0.0.1                                                 # 监听接口  仅监听本机回环地址
tcp-concurrent: true                                                    # 并发连接  提升多任务性能
unified-delay: true                                                     # 统一延迟  减少节点延迟抖动
log-level: info                                                         # 日志级别  silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
ipv6: false                                                             # 网络协议  是否启用 IPv6 支持
profile:
  store-selected: true                                                  # 保存选择  记住上次选择的节点和策略组
  store-fake-ip: true                                                   # 保存映射  Fake-IP 映射以加快 DNS 命中

# 地理数据
geo-auto-update: true                                                   # 自动更新  geodata
geo-update-interval: 24                                                 # 更新间隔  单位：小时
geodata-mode: true                                                      # 数据分流  使用数据集进行规则与分流匹配
geox-url:
  geosite: https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  geoip:   https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  mmdb:    https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb
  asn:     https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb
  
# TUN配置
tun:
  enable: true                                                          # 网卡模式  是否启用 TUN 虚拟网卡模式  
  stack: mixed                                                          # 协议类型  网络栈：system（系统栈）/ gvisor（内置用户态栈）/ mixed（混合）
  dns-hijack: [any:53, "tcp://any:53"]                                  # 劫持请求  劫持所有 UDP/TCP 53 端口的 DNS 请求
  auto-detect-interface: true                                           # 自动出口  自动识别默认出口网络接口 （仅内核模式有效）
  auto-route: true                                                      # 自动路由  自动添加系统路由表      （仅内核模式有效）
  auto-redirect: true                                                   # 自动定向  自动将流量重定向至 TUN  （仅内核模式有效）
  strict-route: false                                                   # 路由模式  严格路由模式
  endpoint-independent-nat: true                                        # 端点无关  NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）

# 嗅探功能
sniffer:
  enable: true                                                          # 启用嗅探  提升透明代理 / TUN 场景下的域名分流准确性
  override-destination: false                                           # 覆盖目标  全局不覆盖目标地址，降低误嗅探导致异常的概率
  parse-pure-ip: false                                                  # 纯 IP 嗅探  不强制嗅探所有纯 IP 连接，减少游戏、P2P、IoT、远控异常
  force-dns-mapping: true                                               # 强制映射  对 DNS 映射流量进行嗅探，适合 Fake-IP / TUN 场景

  sniff:
    HTTP:
      ports: [80, 8080-8880]                                            # 嗅探参数  HTTP 明文流量及常见 Web / 代理端口段
      override-destination: true                                        # 覆盖目标  HTTP 明文流量可安全使用嗅探域名覆盖原始目标
    TLS:
      ports: [443, 8443]                                                # 嗅探参数  HTTPS / TLS SNI，常用端口及备用端口
    QUIC:
      ports: [443, 8443]                                                # 嗅探参数  QUIC / HTTP/3 常用端口及备用端口

  force-domain:
    - "+.netflix.com"                                                   # 强制嗅探  Netflix 主域名
    - "+.nflxvideo.net"                                                 # 强制嗅探  Netflix 视频 CDN
    - "+.media.dssott.com"                                              # 强制嗅探  Disney+ 流媒体

  skip-domain:
    - "+.apple.com"                                                     # 跳过嗅探  苹果服务，减少推送、iCloud、系统服务异常
    - "Mijia Cloud"                                                     # 跳过嗅探  米家云服务，避免设备通信异常
    - "dlg.io.mi.com"                                                   # 跳过嗅探  小米设备通信
    - "+.oray.com"                                                      # 跳过嗅探  花生壳服务，避免远程访问异常
    - "+.sunlogin.net"                                                  # 跳过嗅探  向日葵远程控制，避免远控连接异常

# DNS 设置(开启严格路由可以仅保留nameserver)
dns:
  enable: true                                                          # 解析服务  启用 Clash 内置 DNS 服务
  cache-algorithm: arc                                                  # 缓存算法  自适应替换缓存（较LRU命中率更优）
  listen: 127.0.0.1:7874                                                # 监听服务  仅监听本机，避免 DNS 暴露到局域网
  ipv6: false                                                           # 网络协议  关闭 IPv6 DNS 解析支持(防止DNS泄露)
  enhanced-mode: fake-ip                                                # 增强模式  FDNS 增强模式（Fake-IP，用于防止 DNS 泄露）
  fake-ip-range: 198.18.0.1/16                                          # 虚拟地址  Fake-IP 虚拟地址池范围
  fake-ip-filter-mode: blacklist                                        # 过滤模式  Fake-IP 过滤模式（命中规则则返回真实 IP）
  respect-rules: true                                                   # 遵循规则  强制遵循规则顺序
  prefer-h3: false                                                      # 关闭 HTTP/3 支持
  fake-ip-filter:
    - "+.lan"                                                           # 真实解析  局域网域名，避免路由器、NAS、打印机访问异常
    - "+.local"                                                         # 真实解析  mDNS / Bonjour / 本地域名
    - "geosite:cn"                                                      # 真实解析  国内域名，配合国内直连规则使用
    - "geosite:private"                                                 # 真实解析  私有网络 / 内网相关域名
    - "rule-set:add_direct_domain"                                      # 真实解析  自定义直连域名规则集
    - "+.msftconnecttest.com"                                           # 真实解析  Windows 网络连接测试
    - "+.msftncsi.com"                                                  # 真实解析  Windows NCSI 网络状态检测
    - "localhost.ptlogin2.qq.com"                                       # 真实解析  QQ 登录相关
    - "localhost.sec.qq.com"                                            # 真实解析  QQ 安全登录相关
    - "+.in-addr.arpa"                                                  # 真实解析  IPv4 反向解析
    - "+.ip6.arpa"                                                      # 真实解析  IPv6 反向解析
    - "stun.*"                                                          # 真实解析  常见 STUN 服务
    - "+.stun.*.*"                                                      # 真实解析  多级 STUN 域名
    - "+.turn.*.*"                                                      # 真实解析  TURN 中继服务
    - "+.ntp.org"                                                       # 真实解析  NTP 时间同步服务
    - "time.windows.com"                                                # 真实解析  Windows 时间同步
    - "time.apple.com"                                                  # 真实解析  Apple 时间同步
    - "time-ios.apple.com"                                              # 真实解析  iOS 时间同步
    - "time.google.com"                                                 # 真实解析  Google 时间同步

  default-nameserver:
    - 223.5.5.5                                                         # 默认 DNS  阿里云，用于解析 DoH / DoT 服务器域名
    - 119.29.29.29                                                      # 默认 DNS  腾讯，用于解析 DoH / DoT 服务器域名

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query                                  # 节点解析  解析代理节点域名，避免解析节点域名时产生循环
    - https://doh.pub/dns-query                                         # 节点解析  腾讯 DoH，作为代理节点域名解析备用

  direct-nameserver:
    - 223.5.5.5                                                         # 直连解析  直连域名使用国内 DNS 重新解析
    - 119.29.29.29                                                      # 直连解析  直连域名备用 DNS

  direct-nameserver-follow-policy: true                                 # 策略跟随  直连解析时遵循 nameserver-policy

  nameserver-policy:
    "rule-set:add_direct_domain": [223.5.5.5, 119.29.29.29]             # 策略解析  自定义直连域名使用国内 DNS
    "geosite:cn,private": [223.5.5.5, 119.29.29.29]                     # 策略解析  国内 / 私有域名使用国内 DNS

  nameserver:
    - https://dns.alidns.com/dns-query                                  # 默认解析  阿里 DoH，普通域名默认解析
    - https://doh.pub/dns-query                                         # 默认解析  腾讯 DoH，普通域名备用解析

  fallback:
    - https://1.1.1.1/dns-query                                         # 后备解析  Cloudflare DoH，用于境外域名防污染
    - https://8.8.8.8/dns-query                                         # 后备解析  Google DoH，用于境外域名防污染

  fallback-filter:
    geoip: true                                                         # 污染过滤  启用 GeoIP 判断
    geoip-code: CN                                                      # 污染过滤  国内结果走 nameserver，非国内异常结果使用 fallback


# ※※※※※※※※※※※※※※※ 代理策略组 ※※※※※※※※※※※※※※※
proxy-groups:
  - {name: 一键代理, type: select, proxies: [全局最优, 稳定备用, 香港节点, 澳门节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 欧洲节点, 家宽节点, 其他节点], icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Rocket.png}
