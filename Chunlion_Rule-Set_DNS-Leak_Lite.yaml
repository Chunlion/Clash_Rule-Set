  - {name: 家宽节点,   <<: *Anchor_HS, filter: *Anchor_HOME, icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/05icon/home.png}
  - {name: 香港节点,   <<: *Anchor_HS, filter: *Anchor_HK, icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Hongkong(3).png}
  - {name: 澳门节点,   <<: *Anchor_HS, filter: *Anchor_MO, icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Macao.png}
  - {name: 台湾节点,   <<: *Anchor_HS, filter: *Anchor_TW, icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/taiwan(4).png}
