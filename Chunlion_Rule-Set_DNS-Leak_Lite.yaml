# ※※※※※※※※※※※※※※※ 规则匹配 ※※※※※※※※※※※※※※※
rules:
   # 特殊自定义规则（无法被标准 Geo 替代的，保留外部调用）
  - RULE-SET,emby_domain,Emby                                           # Emby
  - RULE-SET,emby_ip,Emby,no-resolve                                    # Emby IP
  - RULE-SET,add_emby,Emby                                              # Emby
  - RULE-SET,add_direct_domain,DIRECT                                   # 直连域名

  # 服务分流
  - GEOSITE,private,DIRECT                                              # Private Domain
  - GEOIP,private,DIRECT,no-resolve                                     # Private IP

  - GEOSITE,steam@cn,DIRECT                                             # Steam中国
  - GEOSITE,microsoft@cn,DIRECT                                         # Microsoft中国
  - GEOSITE,apple@cn,DIRECT                                             # Apple中国

  - GEOSITE,category-ai-!cn,AI Services                                 # AI Services

  - GEOSITE,category-media@cn,DIRECT                                    # 国内媒体
  - GEOSITE,category-media,Streaming                                    # 流媒体
  - GEOIP,netflix,Streaming,no-resolve                                  # Netflix IP
  - GEOSITE,tiktok,TikTok                                               # TikTok

  - GEOSITE,telegram,Telegram                                           # Telegram
  - GEOIP,telegram,Telegram,no-resolve                                  # Telegram IP

  - GEOSITE,google,Google                                               # Google
  - GEOIP,google,Google,no-resolve                                      # Google IP

  # 可选软件分流：与上方对应策略组同时取消注释后生效。
  # - GEOSITE,github,GitHub
  # - GEOSITE,apple,Apple
  # - GEOSITE,twitter,Twitter
  # - GEOIP,twitter,Twitter,no-resolve
  # - GEOSITE,microsoft,Microsoft

  - GEOSITE,category-cryptocurrency,Crypto                              # 加密货币
  - GEOSITE,paypal,PayPal                                               # PayPal
  - GEOSITE,category-finance,PayPal                                     # 金融平台

  - GEOSITE,category-games@cn,DIRECT                                    # 国内游戏
  - GEOSITE,category-games,Games                                        # 游戏

  # 区域划分兜底
  - GEOSITE,cn,DIRECT                                                   # 中国域名
  - GEOIP,cn,DIRECT,no-resolve                                          # 中国IP
  - GEOSITE,geolocation-!cn,一键代理                                     # 排除国内
  - MATCH,兜底流量                                                       # 兜底规则

# 规则来源 (
rule-providers:
  emby_domain: { <<: *Anchor_DN, url: "https://raw.githubusercontent.com/666OS/rules/release/mihomo/domain/Emby.mrs"}
