# 名称： Chunlion_Rule-Set_DNS-Leak_Lite
# 项目地址：https://github.com/Chunlion/Clash_Rule-Set
# 说明： ①本文件适用于Mihomo核心的工具使用； ②使用前需补充完整 “订阅链接” 与 “机场名”;  ③订阅链接和机场名请勿随意泄露，以免造成不必要的麻烦； 
# 原作者频道：https://t.me/Seven1gogogo，项目地址：https://github.com/Seven1echo/Yaml，此分流文件大幅度精简规则仅保留必要分流，并且做了防止DNS泄露的配置，欢迎参考修改。


# ※※※※※※※※※※※※※※※ 锚点区域 ※※※※※※※※※※※※※※※
# ① 订阅锚点
Anchor_PR: &Anchor_PR {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 300}, filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$"}
# ② 出站锚点
Anchor_OB: &Anchor_OB {type: select, proxies: [一键代理, 全局最优, 稳定备用, 香港节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 欧洲节点, 其他节点, DIRECT, REJECT]}
Anchor_AI: &Anchor_AI {type: select, proxies: [美国节点,一键代理,香港节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 欧洲节点, 其他节点, DIRECT, REJECT]}
Anchor_UK: &Anchor_UK {type: select, proxies: [欧洲节点,DIRECT]}
# ③ 策略锚点
Anchor_HS: &Anchor_HS {type: select, include-all: true}
Anchor_UT_Global: &Anchor_UT_Global {type: url-test, url: 'https://cp.cloudflare.com/generate_204', interval: 300, tolerance: 50, timeout: 2000, hidden: true, include-all: true}
Anchor_FB_Global: &Anchor_FB_Global {type: fallback, url: 'https://cp.cloudflare.com/generate_204', interval: 300, timeout: 2000, hidden: true}
# ④ 规则锚点
Anchor_DN: &Anchor_DN {type: http, interval: 86400, behavior: domain, format: mrs}
Anchor_IP: &Anchor_IP {type: http, interval: 86400, behavior: ipcidr, format: mrs}
Anchor_CL: &Anchor_CL {type: http, interval: 86400, behavior: classical, format: text}
# ⑤ 区域锚点
Anchor_HK: &Anchor_HK '^(?i)(?=.*(香港|🇭🇰|\bHK\b|Hong(?:\s?Kong)?|HKG)).*$'
Anchor_TW: &Anchor_TW '^(?i)(?=.*(台湾|台灣|🇹🇼|\bTW\b|\bTPE\b|\bTSA\b|\bKHH\b|taiwan|TPE|TSA|KHH)).*$'
Anchor_JP: &Anchor_JP '^(?i)(?=.*(日本|🇯🇵|\bJP\b|Japan|NRT|HND|KIX|CTS|FUK)).*$'
Anchor_KR: &Anchor_KR '^(?i)(?=.*(韩国|韓國|🇰🇷|首尔|首爾|\bKR\b|\bKOR\b|Korea|Seoul|South)).*$'
Anchor_SG: &Anchor_SG '^(?i)(?=.*(新加坡|🇸🇬|\bSG\b|Singapore|SIN|XSP)).*$'
Anchor_US: &Anchor_US '^(?i)(?=.*(美国|美國|🇺🇸|\bUS\b|\bUSA\b|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
Anchor_EU: &Anchor_EU '^(?i)(?=.*(奥地利|奥地利共和国|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU)).*$'
Anchor_OT: &Anchor_OT '^(?!.*(DIRECT|直接连接|香港|台湾|台灣|日本|韩国|韓國|新加坡|美国|美國|奥地利|比利时|保加利亚|克罗地亚|塞浦路斯|捷克|丹麦|爱沙尼亚|芬兰|法国|德国|希腊|匈牙利|爱尔兰|意大利|拉脱维亚|立陶宛|卢森堡|荷兰|波兰|葡萄牙|罗马尼亚|斯洛伐克|斯洛文尼亚|西班牙|瑞典|英国|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW)).*$'



# ※※※※※※※※※※※※※※※ 节点订阅 ※※※※※※※※※※※※※※※
# 将 “订阅链接” 与 “机场名” 替换为所用机场信息； 订阅条数不够可新增，注意开头缩进，不同条数前方 “机场名” 不能重复； 末尾的 “机场名” 作用为每个节点添加机场名称前缀，可自定义。
proxy-providers:
  机场1: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场1 '}}
  #机场2: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场2 '}}
  #机场3: {<<: *Anchor_PR, url: '订阅链接', override: {additional-prefix: '机场3 '}}


# ※※※※※※※※※※※※※※※ 核心配置 ※※※※※※※※※※※※※※※
# 基础配置
mixed-port: 7893                                                        # 监听端口  HTTP + SOCKS5 混合代理端口
mode: rule                                                              # 工作模式  rule（规则模式）/ global（全局模式）/ direct（直连模式）
find-process-mode: strict                                               # 进程匹配  匹配进程名进行规则分流
allow-lan: true                                                         # 局域连接  是否允许局域网设备连接
bind-address: "*"                                                       # 监听接口  监听的网络接口（* 表示所有接口）
tcp-concurrent: true                                                    # 并发连接  提升多任务性能
unified-delay: true                                                     # 统一延迟  减少节点延迟抖动
log-level: info                                                         # 日志级别  silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
ipv6: false                                                             # 网络协议  是否启用 IPv6 支持
profile:
  store-selected: true                                                  # 保存选择  记住上次选择的节点和策略组
  store-fake-ip: true                                                   # 保存映射  Fake-IP 映射以加快 DNS 命中

# TUN配置
tun:
  enable: true                                                          # 网卡模式  是否启用 TUN 虚拟网卡模式  
  stack: mixed                                                          # 协议类型  网络栈：system（系统栈）/ gvisor（内置用户态栈）/ mixed（混合）
  dns-hijack: [any:53, "tcp://any:53"]                                  # 劫持请求  劫持所有 UDP/TCP 53 端口的 DNS 请求
  auto-detect-interface: true                                           # 自动出口  自动识别默认出口网络接口 （仅内核模式有效）
  auto-route: true                                                      # 自动路由  自动添加系统路由表      （仅内核模式有效）
  auto-redirect: true                                                   # 自动定向  自动将流量重定向至 TUN  （仅内核模式有效）
  strict-route: false                                                   # 路由模式  严格路由模式
  endpoint-independent-nat: true                                        # 端点无关  NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）

# 嗅探功能
sniffer:
  enable: true                                                          # 启用嗅探  提升分流准确性
  override-destination: true                                            # 成功解析  使用嗅探到的域名覆盖原始目标地址
  parse-pure-ip: true                                                   # 反向解析  解析纯 IP 连接（尝试反向解析获得域名）
  force-dns-mapping: true                                               # 强制映射  DNS 映射（对纯 IP 连接尝试 DNS 映射）
  sniff:
    QUIC:
      ports: [443, 8443]                                                # 嗅探参数  QUIC 协议流量（HTTP/3 常用端口及备用）
    TLS:
      ports: [443, 8443]                                                # 嗅探参数  HTTPS（TLS）常用及备用端口
    HTTP:
      ports: [80, 8080-8880]                                            # 嗅探参数  HTTP 及常见 Web / 代理端口段
  force-domain:
    - "+.netflix.com"                                                   # 强制嗅探  Netflix 主域名
    - "+.nflxvideo.net"                                                 # 强制嗅探  Netflix CDN
    - "+.amazonaws.com"                                                 # 强制嗅探  AWS 云服务
    - "+.media.dssott.com"                                              # 强制嗅探  Disney+ Streaming
  skip-domain:
    - "+.apple.com"                                                     # 跳过嗅探  苹果服务
    - Mijia Cloud                                                       # 跳过嗅探  米家云服务
    - dlg.io.mi.com                                                     # 跳过嗅探  小米设备通信
    - "+.oray.com"                                                      # 跳过嗅探  花生壳服务
    - "+.sunlogin.net"                                                  # 跳过嗅探  向日葵远程控制
    - "+.push.apple.com"                                                # 跳过嗅探  苹果推送服务

# DNS 设置(开启严格路由可以仅保留nameserver)
dns:
  enable: true                                                          # 解析服务  启用 Clash 内置 DNS 服务
  cache-algorithm: arc                                                  # 缓存算法  自适应替换缓存（较LRU命中率更优）
  listen: 0.0.0.0:7874                                                  # 监听服务  DNS 服务监听地址与端口
  ipv6: false                                                           # 网络协议  关闭 IPv6 DNS 解析支持(防止DNS泄露)
  enhanced-mode: fake-ip                                                # 增强模式  FDNS 增强模式（Fake-IP，用于防止 DNS 泄露）
  fake-ip-range: 198.18.0.1/16                                          # 虚拟地址  Fake-IP 虚拟地址池范围
  fake-ip-filter-mode: blacklist                                        # 过滤模式  Fake-IP 过滤模式（命中规则则返回真实 IP）
  respect-rules: true                                                   # 遵循规则  强制遵循规则顺序
  prefer-h3: false                                                      # 关闭 HTTP/3 支持
  fake-ip-filter:
    - "+.lan"                                                           # 真实解析  常见局域网域名后缀
    - "geosite:cn"                    
    - "geosite:private"                
    - "rule-set:add_direct_domain"
    - "+.local"
    - "+.msftconnecttest.com"                                           # 真实解析  Windows 网络连接测试
    - "+.msftncsi.com"                                                  # 真实解析  Windows 网络连接测试
    - "localhost.ptlogin2.qq.com"                                       # 真实解析  QQ 登录
    - "localhost.sec.qq.com"                                            # 真实解析  QQ 登录
    - "+.in-addr.arpa"                                                  # 真实解析  IPv4 反向解析
    - "+.ip6.arpa"
    - "stun.*"                                                          # 真实解析  STUN 服务
    - "time.*.com"                                                      # 真实解析  NTP 时间服务                      
    - "time.*.gov"                                                      # 真实解析  NTP 时间服务
    - "pool.ntp.org"                                                    # 真实解析  NTP 时间服务      
    - "+.ntp.org"                                                       # NTP 时间同步
    - "+.pool.ntp.org"
    - "+._tcp.*"                     
    - "+._udp.*"
    - "+.stun.*.*"                   
    - "+.stun.*.*.*"
    - "+.xbox.com"                   
    - "+.xboxlive.com"
    - "+.turn.*"                     
    - "+.turn.*.*"      
  default-nameserver:
    - 223.5.5.5                                                         # 公共 DNS  阿里云
    - 119.29.29.29                                                      # 公共 DNS  腾讯
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:add_direct_domain": [223.5.5.5, 119.29.29.29]   
    "geosite:cn,private": [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:  
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN


# ※※※※※※※※※※※※※※※ 代理策略组 ※※※※※※※※※※※※※※※
proxy-groups:
  - {name: 一键代理, type: select, proxies: [全局最优, 稳定备用, 香港节点, 台湾节点, 日本节点, 韩国节点, 新加坡节点, 美国节点, 欧洲节点, 其他节点], icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Rocket.png}
  - {name: Streaming,   <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/YouTube.png}
  - {name: Google,    <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Google.png}
  - {name: AI Services,   <<: *Anchor_AI, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AI.png}
  - {name: TikTok,    <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/TikTok.png}
  - {name: Wise,      <<: *Anchor_OB, icon: https://fastly.jsdelivr.net/gh/Chunlion/Clash-Icons@main/wise.png}
  - {name: Games,      <<: *Anchor_OB, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png}
  - {name: UKwifi,    <<: *Anchor_UK, icon: https://www.giffgaff.design/iconography/icons/library/coverage-signal.svg}
  - {name: 兜底流量,   <<: *Anchor_OB, icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png}

# 策略组（按区域分组）- 仅保留选择，拒绝后台并发测速灾难
  - {name: 全局最优, <<: *Anchor_UT_Global}
  - {name: 稳定备用, <<: *Anchor_FB_Global, proxies: [香港节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 欧洲节点]}
  - {name: 香港节点,   <<: *Anchor_HS, filter: *Anchor_HK, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/HK.png}
  - {name: 台湾节点,   <<: *Anchor_HS, filter: *Anchor_TW, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/TW.png}
  - {name: 日本节点,   <<: *Anchor_HS, filter: *Anchor_JP, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/JP.png}
  - {name: 韩国节点,   <<: *Anchor_HS, filter: *Anchor_KR, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/KR.png}
  - {name: 新加坡节点, <<: *Anchor_HS, filter: *Anchor_SG, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/SG.png}
  - {name: 美国节点,   <<: *Anchor_HS, filter: *Anchor_US, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/US.png}
  - {name: 欧洲节点,   <<: *Anchor_HS, filter: *Anchor_EU, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/EU.png}
  - {name: 其他节点,   <<: *Anchor_HS, filter: *Anchor_OT, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/OT.png}


